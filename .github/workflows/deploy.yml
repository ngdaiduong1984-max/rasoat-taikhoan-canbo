name: Deploy GitHub Pages

# Đẩy lên nhánh main là tự deploy trang tĩnh lên GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Chỉ đưa các tệp của TRANG WEB lên Pages (bỏ apps-script, tests, tài liệu…)
      - name: Chuẩn bị thư mục trang
        run: |
          mkdir -p _site
          cp index.html admin.html _site/
          cp -r css js assets _site/
          touch _site/.nojekyll   # tránh Jekyll bỏ qua tệp bắt đầu bằng "_"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
